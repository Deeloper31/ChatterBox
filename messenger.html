<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WhatsAppClone</title>
<style>
body{margin:0;font-family:sans-serif;background:#ecf0f1}
.app{display:flex;height:100vh}
.sidebar{width:25%;background:#2c3e50;color:white;display:flex;flex-direction:column;padding:10px;overflow-y:auto}
.sidebar h2{margin:5px 0;font-size:18px;border-bottom:1px solid #34495e;padding-bottom:5px}
.chat-window{flex:1;display:flex;flex-direction:column;background:#ecf0f1}
#chat-header{height:50px;background:#3498db;color:white;display:flex;align-items:center;padding:0 10px;font-weight:bold}
#chat-messages{flex:1;overflow-y:auto;padding:10px}
.message {padding: 10px 15px;margin: 5px;border-radius: 20px;max-width: 60%;word-wrap: break-word;box-shadow: 2px 2px 6px rgba(0,0,0,0.2);}
.from-me { background:#3498db; color:white; margin-left:auto; text-align:right; }
.from-them { background:#2ecc71; color:white; margin-right:auto; text-align:left; }
input, button{padding:10px;font-size:16px}
#message-input{flex:1;border:none;border-radius:10px;margin-right:5px}
input:focus{outline:none}
button{border:none;background:#2ecc71;color:white;border-radius:10px;cursor:pointer}
button:hover{background:#27ae60}
.input-area{display:flex;padding:10px;background:#ecf0f1}
.contact-btn, .group-btn{width:100%;margin:2px 0;padding:5px;border:none;border-radius:5px;background:#34495e;color:white;cursor:pointer;text-align:left}
.contact-btn:hover, .group-btn:hover{background:#1abc9c}
</style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <h2>Contacts</h2>
        <div id="contacts"></div>
        <input type="text" id="new-contact" placeholder="Add contact">
        <button onclick="addContact()">Add Contact</button>
        <h2>Groups</h2>
        <div id="groups"></div>
        <input type="text" id="new-group" placeholder="Group name">
        <input type="text" id="group-members" placeholder="Members comma-separated">
        <button onclick="createGroup()">Create Group</button>
    </div>
    <div class="chat-window">
        <div id="chat-header">Select Contact</div>
        <div id="chat-messages"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type message">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
let currentChat=null;
let username=null;

// ---------------- Persistent Storage ----------------
function loadData() {
    let data = localStorage.getItem("whatsapp_clone");
    if(!data){
        let initial = {users:[], contacts:[], groups:[], messages:[]};
        localStorage.setItem("whatsapp_clone", JSON.stringify(initial));
        return initial;
    }
    return JSON.parse(data);
}
function saveData(data){
    localStorage.setItem("whatsapp_clone", JSON.stringify(data));
}

// ---------------- Login / Signup ----------------
function loginPrompt(){
    username = prompt("Enter your username:");
    let password = prompt("Enter password:");
    let data = loadData();
    let user = data.users.find(u=>u.username===username);
    if(user){
        if(user.password===password){ loadContacts(); loadGroups(); startRefresh(); }
        else { alert("Wrong password"); loginPrompt(); }
    } else {
        alert("User not found. Signing up automatically.");
        data.users.push({username,password});
        saveData(data);
        loginPrompt();
    }
}

// ---------------- Contacts & Groups ----------------
function addContact(){
    let contact = document.getElementById("new-contact").value.trim();
    if(!contact) return;
    let data = loadData();
    if(!data.users.find(u=>u.username===contact)){
        alert("User does not exist");
        return;
    }
    if(!data.contacts.find(c=>c.owner===username && c.contact_username===contact)){
        data.contacts.push({owner:username, contact_username:contact});
        saveData(data);
        loadContacts();
    }
}
function createGroup(){
    let group_name = document.getElementById("new-group").value.trim();
    let members = document.getElementById("group-members").value.split(",").map(s=>s.trim()).filter(s=>s);
    if(!group_name || members.length===0) return;
    let data = loadData();
    if(!data.groups.find(g=>g.group_name===group_name)){
        data.groups.push({group_name, members, messages:[]});
        saveData(data);
        loadGroups();
    }
}
function loadContacts(){
    let container=document.getElementById("contacts"); container.innerHTML="";
    let data = loadData();
    let contacts = data.contacts.filter(c=>c.owner===username);
    contacts.forEach(c=>{
        let btn=document.createElement("button"); btn.className="contact-btn"; btn.innerText=c.contact_username;
        btn.onclick=()=>{currentChat=c.contact_username; document.getElementById("chat-header").innerText="Chat with "+currentChat; refreshMessages();};
        container.appendChild(btn);
    });
}
function loadGroups(){
    let container=document.getElementById("groups"); container.innerHTML="";
    let data = loadData();
    let groups = data.groups.filter(g=>g.members.includes(username));
    groups.forEach(g=>{
        let btn=document.createElement("button"); btn.className="group-btn"; btn.innerText=g.group_name;
        btn.onclick=()=>{currentChat=g.group_name; document.getElementById("chat-header").innerText="Group: "+currentChat; refreshMessages();};
        container.appendChild(btn);
    });
}

// ---------------- Messages ----------------
function sendMessage(){
    let msg=document.getElementById("message-input").value.trim();
    if(!currentChat || !msg) return;
    let data = loadData();
    data.messages.push({from:username, to:currentChat, message:msg});
    saveData(data);
    document.getElementById("message-input").value="";
    refreshMessages();
}
function refreshMessages(){
    if(!currentChat) return;
    let container=document.getElementById("chat-messages"); container.innerHTML="";
    let data = loadData();
    let msgs = data.messages.filter(m=> (m.from===username && m.to===currentChat) || (m.from===currentChat && m.to===username));
    msgs.forEach(m=>{
        let div=document.createElement("div");
        div.className = (m.from===username) ? "message from-me" : "message from-them";
        div.innerText = m.from + ": " + m.message;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    });
}
function startRefresh(){ setInterval(refreshMessages,500); }

window.onload=loginPrompt;
</script>
</body>
</html>
